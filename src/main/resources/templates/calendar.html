<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>정책 캘린더</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body data-page="calendar">
<header class="topbar">
  <a href="/" class="brand">themoa 정책 검색</a>
  <nav>
    <a href="/">정책 검색</a>
    <a href="/bookmarks">관심 정책</a>
    <a href="/calendar">정책 캘린더</a>
    <a href="/dev-console">개발 확인</a>
  </nav>
</header>
<main class="shell">
  <div class="calendar-toolbar">
    <h1 id="calendarTitle">정책 캘린더</h1>
    <div class="actions">
      <button type="button" id="prevMonth">이전 달</button>
      <button type="button" id="todayMonth">오늘</button>
      <button type="button" id="nextMonth">다음 달</button>
    </div>
  </div>
  <div id="error" class="notice danger" hidden></div>
  <section id="calendar" class="month-calendar"></section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
